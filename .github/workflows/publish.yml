name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for trusted publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify version matches tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG does not match package version $PKG_VERSION"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Option 1: Trusted publishing (preferred, no token needed)
          # Requires one-time setup at pypi.org/manage/project/arrowjet/settings/publishing/
          # Add: GitHub repo arrowjet/arrowjet, workflow publish.yml, environment (blank)
          #
          # Option 2: API token (fallback)
          # Set PYPI_API_TOKEN in GitHub repo Settings > Secrets > Actions
          password: ${{ secrets.PYPI_API_TOKEN }}
